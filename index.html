<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Palabras y Caracteres Gratis</title>
    <meta name="description" content="Herramienta gratuita para contar palabras, caracteres y párrafos online. Ideal para estudiantes y profesionales.">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            background-color: #0056b3;
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
        }
        .container {
            width: 80%;
            max-width: 800px;
            margin: 20px 0;
        }
        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ccc;
            border-radius: 8px;
            resize: vertical;
            box-sizing: border-box;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            background-color: white;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .stat-box {
            text-align: center;
            font-size: 1.2em;
        }
        .stat-box span {
            display: block;
            font-size: 2em;
            font-weight: bold;
            color: #0056b3;
        }
        /* Estilos para el espacio publicitario */
        .ad-container {
            width: 100%;
            max-width: 800px;
            height: 90px;
            background-color: #e9ecef;
            border: 1px dashed #adb5bd;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c757d;
            margin: 20px 0;
            text-align: center;
        }
    </style>
    </head>
<body>

    <header>
        <h1>Contador de Palabras Online</h1>
    </header>

    <div class="ad-container">
        <p>Espacio para tu bloque de anuncios de Google AdSense (Banner Horizontal)</p>
        </div>

    <div class="container">
        <textarea id="textInput" placeholder="Escribe o pega tu texto aquí para empezar a contar..."></textarea>
        
        <div class="stats">
            <div class="stat-box">Palabras <span id="wordCount">0</span></div>
            <div class="stat-box">Caracteres <span id="charCount">0</span></div>
            <div class="stat-box">Sin Espacios <span id="charNoSpaceCount">0</span></div>
        </div>
    </div>

    <div class="ad-container" style="height: 250px;">
        <p>Espacio para tu bloque de anuncios de Google AdSense (Banner Cuadrado)</p>
        </div>

    <script>
        const textInput = document.getElementById('textInput');
        const wordCount = document.getElementById('wordCount');
        const charCount = document.getElementById('charCount');
        const charNoSpaceCount = document.getElementById('charNoSpaceCount');

        textInput.addEventListener('input', function() {
            let text = this.value;
            
            // Contar caracteres
            charCount.textContent = text.length;
            
            // Contar caracteres sin espacios
            charNoSpaceCount.textContent = text.replace(/\s/g, '').length;
            
            // Contar palabras
            let words = text.trim().split(/\s+/);
            if (text.trim() === '') {
                wordCount.textContent = 0;
            } else {
                wordCount.textContent = words.length;
            }
        });
    </script>
</body>
</html>
